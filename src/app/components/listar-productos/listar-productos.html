<div class="productos-container">
  <h1 class="titulo-principal">Listado de productos</h1>
  <p class="subtitulo">Consulta, edita o elimina productos de tu inventario fácilmente.</p>

  <div class="tabla-contenedor">
    <h2 class="titulo-seccion">LISTADO DE PRODUCTOS</h2>
    <table class="tabla-productos">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Categoría</th>
          <th>Ubicación</th>
          <th>Precio</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Producto 1 - Estático -->
        <tr>
          <td>Coca Cola</td>
          <td>Bebida</td>
          <td>Carmen de bolivar</td>
          <td>4</td>
          <td class="acciones">
            <button class="btn-editar">Editar</button>
            <button class="btn-eliminar">Eliminar</button>
          </td>
        </tr>
        
        <!-- Producto 2 - Estático -->
        <tr>
          <td>Papas fritas</td>
          <td>Alimento</td>
          <td>Carmen de bolivar</td>
          <td>3</td>
          <td class="acciones">
            <button class="btn-editar">Editar</button>
            <button class="btn-eliminar">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="nuevo-producto">
    <button class="btn-nuevo">+ NUEVO PRODUCTO</button>
  </div>

  <footer class="pie-pagina">
    <p>© 2025 Mi Tienda. Todos los derechos reservados.</p>
  </footer>
</div>
